<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reset Password - IMS</title>
    <link rel="stylesheet" href="/static/auth.css">
    <style>
        .hidden {
            display: none;
        }

        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .otp-inputs input {
            width: 45px;
            text-align: center;
            font-size: 20px;
            border: 2px solid #ccc;
            border-radius: 8px;
            padding: 8px 0;
            outline: none;
            transition: border-color 0.2s;
        }

        .otp-inputs input:focus {
            border-color: #4f46e5;
        }

        .msg-box {
            font-size: 13px;
            text-align: center;
            margin-top: 8px;
            min-height: 18px;
        }

        .msg-box.error {
            color: #e53e3e;
        }

        .msg-box.success {
            color: #38a169;
        }
    </style>
</head>

<body>
    <div class="auth-container">

        <div class="auth-logo">
            <img src="../static/WORKFLOW.png" alt="WareFlow Logo" class="logo-img">
        </div>

        <div id="step-email">
            <h2>Forgot Password?</h2>
            <p style="font-size:13px;color:#666;text-align:center;">
                Enter your registered email to receive a 4-digit OTP.
            </p>
            <div class="form-group">
                <label>Registered Email</label>
                <input type="email" id="email" placeholder="YourEmail@Gmail.com" required>
            </div>
            <div class="msg-box" id="email-msg"></div>
            <button class="btn-auth" onclick="sendOTP()" id="send-btn">Send OTP</button>
        </div>

        <div id="step-otp" class="hidden">
            <h2>Verify OTP</h2>
            <p style="font-size:13px;color:#666;text-align:center;">
                A 4-digit code has been sent to your email.
            </p>
            <div class="otp-inputs">
                <input type="text" maxlength="1" class="otp-field" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-field" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-field" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-field" inputmode="numeric">
            </div>
            <div class="msg-box" id="otp-msg"></div>
            <button class="btn-auth" onclick="verifyOTP()">Verify Code</button>
        </div>

        <div id="step-new-password" class="hidden">
            <h2>Create New Password</h2>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="new-pass" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm-pass" placeholder="••••••••">
            </div>
            <div class="msg-box" id="pass-msg"></div>
            <button class="btn-auth" onclick="resetComplete()">Update Password</button>
        </div>

        <div class="auth-footer">
            <a href="/login">Back to Login</a>
        </div>

    </div>

    <script>
        async function sendOTP() {
            const email = document.getElementById("email").value.trim();
            const sendBtn = document.getElementById("send-btn");

            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showMsg("email-msg", "Please enter a valid email address.", "error");
                return;
            }

            showMsg("email-msg", "Sending OTP… please wait.", "success");
            sendBtn.disabled = true;
            sendBtn.textContent = "Sending…";

            try {
                const res = await fetch("/send-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (data.success) {
                    showMsg("email-msg", "OTP sent! Check your inbox.", "success");
                    setTimeout(() => {
                        document.getElementById("step-email").classList.add("hidden");
                        document.getElementById("step-otp").classList.remove("hidden");
                        document.querySelectorAll(".otp-field")[0].focus();
                    }, 800);
                } else {
                    showMsg("email-msg", data.message || "Failed to send OTP.", "error");
                    sendBtn.disabled = false;
                    sendBtn.textContent = "Send OTP";
                }
            } catch (err) {
                showMsg("email-msg", "Server error: " + err.message, "error");
                sendBtn.disabled = false;
                sendBtn.textContent = "Send OTP";
            }
        }

        async function verifyOTP() {
            const fields = document.querySelectorAll(".otp-field");
            const entered = Array.from(fields).map(f => f.value).join("").trim();

            if (entered.length < 4) {
                showMsg("otp-msg", "Please enter all 4 digits.", "error");
                return;
            }

            try {
                const res = await fetch("/verify-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ otp: entered })
                });
                const data = await res.json();

                if (data.success) {
                    showMsg("otp-msg", "OTP verified! ✓", "success");
                    setTimeout(() => {
                        document.getElementById("step-otp").classList.add("hidden");
                        document.getElementById("step-new-password").classList.remove("hidden");
                    }, 700);
                } else {
                    showMsg("otp-msg", data.message || "Incorrect OTP.", "error");
                    fields.forEach(f => f.value = "");
                    fields[0].focus();
                }
            } catch (err) {
                showMsg("otp-msg", "Server error: " + err.message, "error");
            }
        }

        async function resetComplete() {
            const email = document.getElementById("email").value.trim();
            const newPass = document.getElementById("new-pass").value;
            const confirmPass = document.getElementById("confirm-pass").value;

            if (!newPass || newPass.length < 6) {
                showMsg("pass-msg", "Password must be at least 6 characters.", "error");
                return;
            }
            if (newPass !== confirmPass) {
                showMsg("pass-msg", "Passwords do not match.", "error");
                return;
            }
            
            try {
                const res = await fetch("/update-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: email, new_password: newPass })
                });
                const data = await res.json();
                
                if (data.success) {
                    showMsg("pass-msg", "Password updated! Redirecting...", "success");
                    setTimeout(() => { window.location.href = "/login"; }, 1500);
                } else {
                    showMsg("pass-msg", data.message || "Failed to update password.", "error");
                }
            } catch (err) {
                showMsg("pass-msg", "Server error: " + err.message, "error");
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const fields = document.querySelectorAll(".otp-field");
            fields.forEach((field, idx) => {
                field.addEventListener("input", () => {
                    field.value = field.value.replace(/\D/g, "");
                    if (field.value && idx < fields.length - 1) fields[idx + 1].focus();
                });
                field.addEventListener("keydown", (e) => {
                    if (e.key === "Backspace" && !field.value && idx > 0) fields[idx - 1].focus();
                });
            });
        });

        function showMsg(id, text, type) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = text;
            el.className = "msg-box " + type;
        }
    </script>
</body>

</html>
